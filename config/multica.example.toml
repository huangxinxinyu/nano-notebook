[workspace]
name = "<workspace-name>"
id = "<workspace-id>"

[project]
name = "<project-name>"
id = "<project-id>"

[agents]
delivery_expert_id = "<delivery-expert-agent-id>"
qa_id = "<qa-agent-id>"
reviewer_id = "<reviewer-agent-id>"

[repository]
resource = "<project-git-resource>"
default_ref = "main"
candidate_branch = "multica/<parent-identifier>"
target_branch = "main"

[runtime]
id = "<runtime-id>"
require_online = true

[limits]
max_active_issues = 3
active_parent_limit = 1
