services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nano
      POSTGRES_PASSWORD: nano
      POSTGRES_DB: nano
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nano -d nano"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  observability-init:
    image: postgres:16-alpine
    profiles: ["collector"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: nano
    command:
      - /bin/sh
      - -ec
      - |
        if ! psql -h postgres -U nano -d nano -tAc "select 1 from pg_roles where rolname='nano_observability'" | grep -q 1; then
          psql -h postgres -U nano -d nano -v ON_ERROR_STOP=1 -c "create role nano_observability login password 'nano-observability'"
        fi
        if ! psql -h postgres -U nano -d nano -tAc "select 1 from pg_database where datname='nano_observability'" | grep -q 1; then
          createdb -h postgres -U nano -O nano_observability nano_observability
        else
          psql -h postgres -U nano -d nano -v ON_ERROR_STOP=1 -c "alter database nano_observability owner to nano_observability"
        fi
        psql -h postgres -U nano -d nano_observability -v ON_ERROR_STOP=1 -c "alter schema public owner to nano_observability"

  collector:
    build:
      context: ../..
      dockerfile: infra/collector/Dockerfile
    profiles: ["collector"]
    depends_on:
      postgres:
        condition: service_healthy
      observability-init:
        condition: service_completed_successfully
    environment:
      NANO_COLLECTOR_ADDR: ":8082"
      NANO_COLLECTOR_DATABASE_URL: postgres://nano_observability:nano-observability@postgres:5432/nano_observability?sslmode=disable
      NANO_COLLECTOR_SERVICE_TOKEN: nano-local-collector-token
      NANO_COLLECTOR_PRODUCER_ID: nano-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "58082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/internal/agent-observability/v1/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nano
      MINIO_ROOT_PASSWORD: nano-password
    ports:
      - "59000:9000"
      - "59001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - minio-data:/data

  qdrant:
    image: qdrant/qdrant:v1.15.1
    ports:
      - "56333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - qdrant-data:/qdrant/storage

  bifrost:
    image: maximhq/bifrost:v1.6.3
    env_file:
      - path: .env
        required: false
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "56666"
      LOG_LEVEL: info
      LOG_STYLE: json
    ports:
      - "56666:56666"
    volumes:
      - ../bifrost:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:56666 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "54317:4317"
      - "54318:4318"
      - "51686:16686"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:16686 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  minio-data:
  qdrant-data:
