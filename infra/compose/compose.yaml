services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nano
      POSTGRES_PASSWORD: nano
      POSTGRES_DB: nano
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nano -d nano"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  observability-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nano_observability
      POSTGRES_PASSWORD: nano-observability
      POSTGRES_DB: nano_observability
    ports:
      - "55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nano_observability -d nano_observability"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - observability-postgres-data:/var/lib/postgresql/data

  collector:
    build:
      context: ../..
      dockerfile: infra/collector/Dockerfile
    profiles: ["collector"]
    depends_on:
      observability-postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NANO_COLLECTOR_ADDR: ":8082"
      NANO_COLLECTOR_DATABASE_URL: postgres://nano_observability:nano-observability@observability-postgres:5432/nano_observability?sslmode=disable
      NANO_COLLECTOR_SERVICE_TOKEN: nano-local-collector-token
      NANO_COLLECTOR_QUERY_TOKEN: nano-local-collector-query-token
      NANO_COLLECTOR_DATABASE_MAX_CONNS: "16"
      NANO_COLLECTOR_PROJECTION_DATABASE_MAX_CONNS: "4"
      NANO_COLLECTOR_QUERY_DATABASE_MAX_CONNS: "8"
      NANO_COLLECTOR_PRODUCER_ID: nano-worker
      NANO_REPLAY_STAGING_S3_ENDPOINT: minio:9000
      NANO_REPLAY_STAGING_S3_ACCESS_KEY_ID: nano
      NANO_REPLAY_STAGING_S3_SECRET_ACCESS_KEY: nano-password
      NANO_REPLAY_STAGING_S3_BUCKET: nano-agent-replay-staging
      NANO_REPLAY_S3_ENDPOINT: minio:9000
      NANO_REPLAY_S3_ACCESS_KEY_ID: nano
      NANO_REPLAY_S3_SECRET_ACCESS_KEY: nano-password
      NANO_REPLAY_S3_BUCKET: nano-agent-replay
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "58082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8082/internal/agent-observability/v1/health >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nano
      MINIO_ROOT_PASSWORD: nano-password
    ports:
      - "59000:9000"
      - "59001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        mc alias set local http://minio:9000 nano nano-password
        mc mb --ignore-existing local/nano-agent-replay-staging
        mc mb --ignore-existing local/nano-agent-replay

  qdrant:
    image: qdrant/qdrant:v1.15.1
    ports:
      - "56333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - qdrant-data:/qdrant/storage

  bifrost:
    image: maximhq/bifrost:v1.6.3
    env_file:
      - path: .env
        required: false
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "56666"
      LOG_LEVEL: info
      LOG_STYLE: json
    ports:
      - "56666:56666"
    volumes:
      - ../bifrost:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:56666 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "54317:4317"
      - "54318:4318"
      - "51686:16686"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:16686 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  observability-postgres-data:
  minio-data:
  qdrant-data:
